description: >-
  DCP Midstream Partners is a midstream energy company that gathers,
  processes, transports, stores, and markets natural gas and natural gas
  liquids (NGLs) across major U.S. producing regions. Following Phillips 66's
  acquisition of the remaining public units in 2023, DCP Midstream now
  operates as part of Phillips 66's midstream segment. The company does not
  publish a public developer API; integration with shippers and customers is
  handled through customer portals (tariffs, electronic flow measurement)
  rather than a self-service API.
